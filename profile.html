<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - TOEFL Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100">
        
        <div class="flex items-center gap-4 border-b border-gray-100 pb-6 mb-6">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-3xl">👨‍🎓</div>
            <div>
                <h2 id="profile-name" class="text-xl font-bold text-gray-900">Estudiante</h2>
                <p id="profile-email" class="text-sm text-gray-500">correo@ejemplo.com</p>
            </div>
        </div>

        <h3 class="font-bold text-gray-900 text-lg mb-4 flex items-center gap-2">
            📊 <span>Historial Completo de Intentos</span>
        </h3>
        
        <div class="space-y-6 mb-8">
            <div>
                <h4 class="text-sm font-bold text-blue-700 uppercase tracking-wider mb-2">🎧 Listening Practice</h4>
                <div id="history-listening" class="space-y-2 text-sm text-gray-500 italic">No hay intentos registrados.</div>
            </div>

            <div>
                <h4 class="text-sm font-bold text-amber-700 uppercase tracking-wider mb-2">✍️ Structure Practice</h4>
                <div id="history-structure" class="space-y-2 text-sm text-gray-500 italic">No hay intentos registrados.</div>
            </div>

            <div>
                <h4 class="text-sm font-bold text-emerald-700 uppercase tracking-wider mb-2">📖 Reading Practice</h4>
                <div id="history-reading" class="space-y-2 text-sm text-gray-500 italic">No hay intentos registrados.</div>
            </div>

            <div class="pt-4 border-t border-gray-100">
                <h4 class="text-sm font-bold text-indigo-700 uppercase tracking-wider mb-2">🏆 Full Test Simulator</h4>
                <div id="history-full" class="space-y-2 text-sm text-gray-500 italic">No hay intentos registrados.</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='./dashboard.html'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition cursor-pointer text-center text-sm shadow-sm">
                Volver al Dashboard
            </button>
            <button onclick="logout()" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-3 px-4 rounded-xl transition cursor-pointer text-center text-sm">
                Cerrar Sesión
            </button>
        </div>

    </div>

    <script>
        window.onload = function() {
            // Verificar sesión activa
            const loggedUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!loggedUser) {
                window.location.href = './login.html';
                return;
            }

            // Desplegar datos personales
            document.getElementById('profile-name').innerText = loggedUser.name;
            document.getElementById('profile-email').innerText = loggedUser.email;

            // Cargar e imprimir listas de historial
            renderHistory('listening', 'history-listening', 'bg-blue-50/60 text-blue-900 border-blue-100');
            renderHistory('structure', 'history-structure', 'bg-amber-50/60 text-amber-900 border-amber-100');
            renderHistory('reading', 'history-reading', 'bg-emerald-50/60 text-emerald-900 border-emerald-100');
            renderHistory('full', 'history-full', 'bg-indigo-50 text-indigo-950 border-indigo-100 font-medium');
        };

        function renderHistory(key, elementId, styleClasses) {
    const data = localStorage.getItem(`toefl_scores_history_${key}`);
    const container = document.getElementById(elementId);

    if (data) {
        const historyList = JSON.parse(data);
        
        if (historyList.length > 0) {
            container.innerHTML = ""; 
            
            historyList.reverse().forEach((attempt) => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border ${styleClasses} text-sm shadow-sm flex flex-col gap-2`;
                
                const porcentaje = Math.round((attempt.correctAnswers / attempt.totalQuestions) * 100) || 0;

                // 1. Fila superior principal (Puntaje Total y Fecha)
                let cardContent = `
                    <div class="flex justify-between items-center w-full">
                        <div>
                            <span class="font-bold text-base">Score: ${attempt.correctAnswers} / ${attempt.totalQuestions}</span>
                            <span class="text-xs opacity-75 ml-2">(${porcentaje}%)</span>
                        </div>
                        <div class="text-xs opacity-80 text-right">
                            <span>📅 ${attempt.date} a las ${attempt.time}</span>
                        </div>
                    </div>
                `;

                // 2. SI EL INTENTO TIENE DESGLOSE (Modo Full Test), inyectamos las subsecciones
                if (attempt.breakdown) {
                    cardContent += `
                        <div class="mt-2 pt-2 border-t border-indigo-200/50 grid grid-cols-3 gap-2 text-center text-xs opacity-90 font-mono">
                            <div class="bg-white/50 p-1.5 rounded-lg">🎧 L: <span class="font-bold">${attempt.breakdown.listening}</span></div>
                            <div class="bg-white/50 p-1.5 rounded-lg">✍️ S: <span class="font-bold">${attempt.breakdown.structure}</span></div>
                            <div class="bg-white/50 p-1.5 rounded-lg">📖 R: <span class="font-bold">${attempt.breakdown.reading}</span></div>
                        </div>
                    `;
                }

                card.innerHTML = cardContent;
                container.appendChild(card);
            });
        }
    }
}

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = './login.html';
        }
    </script>
</body>
</html>
