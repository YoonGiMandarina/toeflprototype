<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Simulator - Iniciar Sesión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-600">Welcome Back!</h1>
            <p class="text-sm text-gray-500 mt-1">Enter your credentials to practice</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Email Address</label>
                <input type="email" id="log-email" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500" placeholder="email@example.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Password</label>
                <input type="password" id="log-password" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 cursor-pointer shadow-md shadow-indigo-100">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-gray-100 text-sm text-gray-500">
            Don't have an account? <a href="./register.html" class="text-indigo-600 font-semibold hover:underline">Sign Up here</a>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-password').value;

            // Buscar al usuario en el "banco de datos" del navegador
            const savedUser = localStorage.getItem(`user_${email}`);

            if (!savedUser) {
                alert('This email is not registered. Please create an account first.');
                return;
            }

            const userData = JSON.parse(savedUser);

            // Validar si la contraseña coincide
            if (userData.password === password) {
                // CREAR SESIÓN ACTIVA: Guardamos al usuario actual para que el Dashboard y el Perfil lo reconozcan
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Redirigir al menú principal
                window.location.href = './dashboard.html';
            } else {
                alert('Incorrect password. Please try again.');
            }
        }

        // Si el alumno ya estaba logueado y entra aquí por error, lo mandamos directo al Dashboard
        window.onload = function() {
            if (localStorage.getItem('currentUser')) {
                window.location.href = './dashboard.html';
            }
        }
    </script>
</body>
</html>
