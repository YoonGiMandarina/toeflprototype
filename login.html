<!DOCTYPE html>
<html lang="es">
    <link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TOEFL ITP Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-800 p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 tracking-tight">TOEFL ITP</h1>
            <p class="text-gray-500 mt-2 text-sm">This is your app to prepare for the TOEFL ITP</p>
        </div>

        <div id="error-alert" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg">
            Please enter a valid email and password.
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    placeholder="you@domain.com" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-sm"
                >
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="#" class="text-xs text-indigo-600 hover:underline">Forgot your password?</a>
                </div>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    placeholder="••••••••" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-sm"
                >
            </div>

            <div class="flex items-center">
                <input 
                    type="checkbox" 
                    id="remember" 
                    class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer"
                >
                <label for="remember" class="ml-2 block text-sm text-gray-600 cursor-pointer select-none">
                    Remember my session
                </label>
            </div>

            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer text-sm"
            >
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account? 
            <a href="#" class="font-medium text-indigo-600 hover:underline">Sign up for free</a>
        </p>
    </div>

    <script>
        function handleLogin(event) {
            // Evita que la página se recargue automáticamente al enviar el formulario
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');

            // Simulación básica de validación (¡Cámbiala por tu backend en el futuro!)
            if (email && password.length >= 4) {
                errorAlert.classList.add('hidden');
                
                // Aquí lo redireccionamos al simulador (index.html)
                // Asegúrate de que el archivo del examen se llame exactamente así.
                window.location.href = "dashboard.html"; 
            } else {
                errorAlert.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
